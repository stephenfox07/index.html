<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhatTheFork</title>

<style>
body{margin:0;font-family:sans-serif;background:#b9dff2}

.hero{height:360px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 26%}

.app{max-width:1100px;margin:auto;padding:20px}

.panel{
  background:white;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
}

button{
  margin:4px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#1f86b8;
  color:white;
  cursor:pointer;
}

button.secondary{background:#4fb3df;color:black}
button.ghost{background:white;color:black;border:1px solid #ccc}
</style>

</head>
<body>

<!-- ✅ IMAGE FIX -->
<div class="hero">
  <img src="chimp-kitchen.jpg">
</div>

<div class="app">

<h2>WhatTheFork</h2>
<p>Dinner, decided.</p>

<!-- ✅ BUTTON ROW -->
<div class="panel">
  <button onclick="pick()">Tonight</button>
  <button class="secondary" onclick="pick()">Shuffle</button>
</div>

<!-- ✅ FILTERS -->
<div class="panel">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('30')">≤30</button>
  <button onclick="setFilter('60')">≤60</button>
</div>

<!-- ✅ MEAL DISPLAY -->
<div class="panel">
  <h3>Selected Meal</h3>
  <div id="meal">No meal selected</div>
</div>

</div>

<script>

/* ======================
   ✅ 100 MEALS + TIME FIX
====================== */

const proteins=["chicken","beef","pork","salmon","shrimp","turkey","tofu","eggs","steak","sausage"];
const sauces=["garlic butter","lemon herb","curry","bbq","teriyaki","cream","tomato","soy","honey","spice"];
const sides=["broccoli","rice","potatoes","pasta","salad","zucchini","beans","carrots","corn","cauliflower"];

const MEALS=[];

for(let i=0;i<100;i++){

  let protein=proteins[i%proteins.length];
  let sauce=sauces[Math.floor(Math.random()*sauces.length)];
  let side=sides[Math.floor(Math.random()*sides.length)];

  // ✅ FIXED TIME LOGIC
  let minutes=25+Math.random()*40;

  if(minutes<=30) minutes=25;
  else if(minutes<=60) minutes=45;
  else minutes=60;

  MEALS.push({
    name:`${protein} ${sauce} with ${side}`,
    time:minutes,
    ingredients:[protein,sauce,side,"salt","pepper"],
    steps:[
      "Season protein",
      "Cook protein",
      "Add sauce",
      "Serve with side"
    ]
  });
}

/* ======================
   APP LOGIC
====================== */

let selected=null;
let filter="all";

function setFilter(f){
  filter=f;
}

function getPool(){
  return MEALS.filter(m=>{
    if(filter==="30") return m.time<=30;
    if(filter==="60") return m.time<=60;
    return true;
  });
}

function pick(){
  const pool=getPool();

  if(pool.length===0){
    document.getElementById("meal").innerHTML="No meals match filter";
    return;
  }

  selected=pool[Math.floor(Math.random()*pool.length)];

  document.getElementById("meal").innerHTML=
    `<b>${selected.name}</b><br>
     ${selected.time} minutes<br><br>
     Ingredients: ${selected.ingredients.join(", ")}<br><br>
     Steps:<br>${selected.steps.join("<br>")}`;
}

</script>

</body>
</html>
``
