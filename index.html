<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhatTheFork</title>

<style>
body{margin:0;background:#b9dff2;font-family:sans-serif}
.hero{height:360px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 26%}
.app{max-width:1100px;margin:auto;padding:20px}
button{padding:8px 12px;margin:4px;border:none;border-radius:8px;background:#1f86b8;color:#fff;cursor:pointer}
.panel{background:white;padding:12px;margin:12px 0;border-radius:10px}
</style>
</head>

<body>

<div class="hero">
  <img src="chimp-kitchen.jpg">
</div>

<div class="app">

<h1>WhatTheFork</h1>
<p>Dinner, decided.</p>

<!-- BUTTONS -->
<div class="panel">
  <button onclick="pick()">Tonight</button>
  <button onclick="pick()">Shuffle</button>
</div>

<div class="panel">
  <h3>Selected Meal</h3>
  <div id="meal">No meal selected</div>
</div>

<div class="panel">
  <h3>Shopping List</h3>
  <div id="shopping">Nothing yet</div>
</div>

</div>

<script>

/* ====== 100 MEALS ====== */
const proteins=["chicken","beef","pork","salmon","shrimp","turkey","tofu","eggs","steak","sausage"];
const sauces=["garlic butter","lemon herb","curry","paprika","bbq","teriyaki","cream","tomato","soy","honey"];
const sides=["broccoli","rice","potatoes","pasta","salad","zucchini","beans","carrots","corn","cauliflower"];

const MEALS=[];

for(let i=0;i<100;i++){
  let protein=proteins[i%proteins.length];
  let sauce=sauces[Math.floor(Math.random()*sauces.length)];
  let side=sides[Math.floor(Math.random()*sides.length)];
  
  let minutes=25+Math.floor(Math.random()*40);
  
  if(minutes<=30) minutes=25;
  else if(minutes<=60) minutes=45;
  else minutes=60;

  MEALS.push({
    name:`${protein} with ${sauce} and ${side}`,
    time:minutes,
    ingredients:[protein,sauce,side,"salt","pepper"]
  });
}

/* ====== APP ====== */
let selected=null;

function pick(){
  selected=MEALS[Math.floor(Math.random()*MEALS.length)];
  document.getElementById("meal").innerHTML=
    `<b>${selected.name}</b><br>${selected.time} minutes<br>${selected.ingredients.join(", ")}`;
}

</script>

</body>
</html>
